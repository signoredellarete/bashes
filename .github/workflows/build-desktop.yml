name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Headless tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run Go tests
        run: go test ./...

      - name: Build frontend
        run: npm run build --prefix frontend

  linux-desktop:
    name: Linux desktop build
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Wails app
        run: wails build -tags desktop -clean -nopackage -ldflags "-X main.version=${{ github.ref_name }}" -v 2

      - name: Package Linux binary
        run: |
          scripts/package-linux-release.sh amd64

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v6
        with:
          name: bashes-linux-amd64
          path: dist/bashes-linux-amd64.tar.gz
          if-no-files-found: error

  macos-desktop:
    name: macOS desktop build
    runs-on: macos-14
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Wails app
        run: wails build -platform darwin/universal -tags desktop -clean -ldflags "-X main.version=${{ github.ref_name }}" -v 2

      - name: Locate macOS app
        id: macos-app
        run: |
          set -euo pipefail
          app_path="$(find build/bin -maxdepth 4 -type d -name '*.app' -print -quit)"
          if [ -z "$app_path" ]; then
            echo "No macOS .app bundle found under build/bin"
            find build -maxdepth 5 -print
            exit 1
          fi
          echo "path=$app_path" >> "$GITHUB_OUTPUT"

      - name: Sign macOS app
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_CODESIGN_IDENTITY: ${{ secrets.MACOS_CODESIGN_IDENTITY }}
          RUNNER_TEMP_KEYCHAIN_PASSWORD: bashes-ci-keychain
        run: |
          set -euo pipefail
          if [ -z "$MACOS_CERTIFICATE_P12" ] || [ -z "$MACOS_CERTIFICATE_PASSWORD" ] || [ -z "$MACOS_CODESIGN_IDENTITY" ]; then
            echo "macOS signing secrets are not configured; producing an unsigned test build."
            exit 0
          fi
          security create-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" "$RUNNER_TEMP/bashes-signing.keychain-db"
          security set-keychain-settings -lut 21600 "$RUNNER_TEMP/bashes-signing.keychain-db"
          security unlock-keychain -p "$RUNNER_TEMP_KEYCHAIN_PASSWORD" "$RUNNER_TEMP/bashes-signing.keychain-db"
          python3 - <<'PY'
          import base64
          import os
          from pathlib import Path

          Path(os.environ["RUNNER_TEMP"], "macos-certificate.p12").write_bytes(
              base64.b64decode(os.environ["MACOS_CERTIFICATE_P12"])
          )
          PY
          security import "$RUNNER_TEMP/macos-certificate.p12" \
            -k "$RUNNER_TEMP/bashes-signing.keychain-db" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign
          security list-keychain -d user -s "$RUNNER_TEMP/bashes-signing.keychain-db"
          security set-key-partition-list -S apple-tool:,apple:,codesign: \
            -s -k "$RUNNER_TEMP_KEYCHAIN_PASSWORD" "$RUNNER_TEMP/bashes-signing.keychain-db"
          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_CODESIGN_IDENTITY" "${{ steps.macos-app.outputs.path }}"

      - name: Package macOS app
        run: |
          set -euo pipefail
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.macos-app.outputs.path }}" dist/bashes-darwin-universal.zip

      - name: Notarize macOS app
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "$APPLE_ID" ] || [ -z "$APPLE_TEAM_ID" ] || [ -z "$APPLE_APP_SPECIFIC_PASSWORD" ]; then
            echo "Apple notarization secrets are not configured; producing an unnotarized test build."
            exit 0
          fi
          xcrun notarytool submit dist/bashes-darwin-universal.zip \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD" \
            --wait
          xcrun stapler staple "${{ steps.macos-app.outputs.path }}"
          ditto -c -k --sequesterRsrc --keepParent "${{ steps.macos-app.outputs.path }}" dist/bashes-darwin-universal.zip

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v6
        with:
          name: bashes-darwin-universal
          path: dist/bashes-darwin-universal.zip
          if-no-files-found: error

  windows-desktop:
    name: Windows desktop build
    runs-on: windows-2022
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Wails app
        run: wails build -platform windows/amd64 -tags desktop -clean -nopackage -ldflags "-X main.version=${{ github.ref_name }}" -v 2

      - name: Sign Windows app
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $exe = Get-ChildItem -Path build/bin -Recurse -Filter bashes.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No Windows executable found under build/bin"
          }
          if (-not $env:WINDOWS_CERTIFICATE_PFX -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            Write-Host "Windows signing secrets are not configured; producing an unsigned test build."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-certificate.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            Write-Error "signtool.exe not found"
          }
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certificatePath /p $env:WINDOWS_CERTIFICATE_PASSWORD $exe.FullName

      - name: Package Windows app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem -Path build/bin -Recurse -Filter bashes.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No Windows executable found under build/bin"
          }
          Compress-Archive -Path $exe.FullName -DestinationPath dist/bashes-windows-amd64.zip -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v6
        with:
          name: bashes-windows-amd64
          path: dist/bashes-windows-amd64.zip
          if-no-files-found: error

  linux-arm64-desktop:
    name: Linux ARM64 desktop build
    runs-on: ubuntu-24.04-arm
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Wails app
        env:
          CGO_ENABLED: "1"
        run: wails build -platform linux/arm64 -tags "desktop,webkit2_41" -clean -nopackage -ldflags "-X main.version=${{ github.ref_name }}" -v 2

      - name: Package Linux ARM64 binary
        run: |
          scripts/package-linux-release.sh arm64

      - name: Upload Linux ARM64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: bashes-linux-arm64
          path: dist/bashes-linux-arm64.tar.gz
          if-no-files-found: error

  windows-arm64-desktop:
    name: Windows ARM64 desktop build
    runs-on: windows-2022
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          "$env:USERPROFILE\go\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Wails app
        run: wails build -platform windows/arm64 -tags desktop -clean -nopackage -ldflags "-X main.version=${{ github.ref_name }}" -v 2

      - name: Sign Windows ARM64 app
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_PFX: ${{ secrets.WINDOWS_CERTIFICATE_PFX }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $exe = Get-ChildItem -Path build/bin -Recurse -Filter bashes.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No Windows ARM64 executable found under build/bin"
          }
          if (-not $env:WINDOWS_CERTIFICATE_PFX -or -not $env:WINDOWS_CERTIFICATE_PASSWORD) {
            Write-Host "Windows signing secrets are not configured; producing an unsigned ARM64 test build."
            exit 0
          }
          $certificatePath = Join-Path $env:RUNNER_TEMP "windows-certificate.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_PFX))
          $signtool = Get-ChildItem "${env:ProgramFiles(x86)}\Windows Kits\10\bin" -Recurse -Filter signtool.exe |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1
          if (-not $signtool) {
            Write-Error "signtool.exe not found"
          }
          & $signtool.FullName sign /fd SHA256 /td SHA256 /tr http://timestamp.digicert.com /f $certificatePath /p $env:WINDOWS_CERTIFICATE_PASSWORD $exe.FullName

      - name: Package Windows ARM64 app
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          $exe = Get-ChildItem -Path build/bin -Recurse -Filter bashes.exe | Select-Object -First 1
          if (-not $exe) {
            Write-Error "No Windows ARM64 executable found under build/bin"
          }
          Compress-Archive -Path $exe.FullName -DestinationPath dist/bashes-windows-arm64.zip -Force

      - name: Upload Windows ARM64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: bashes-windows-arm64
          path: dist/bashes-windows-arm64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    runs-on: ubuntu-22.04
    needs:
      - linux-desktop
      - macos-desktop
      - windows-desktop
      - linux-arm64-desktop
      - windows-arm64-desktop
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          assets="$(find release-assets -maxdepth 1 -type f | sort)"
          if [ -z "$assets" ]; then
            echo "No release assets found"
            exit 1
          fi

          {
            printf '# Bashes %s\n\n' "$GITHUB_REF_NAME"
            printf '## RELEASE NOTES\n\n'
            printf -- '- Fix automatic update notifications so new releases are detected on startup.\n'
            printf -- '- Avoid suppressing future checks after a temporary update-check failure.\n\n'
            printf 'Download the package for your platform from the assets attached to this release.\n'
          } > release-notes.md

          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit "$GITHUB_REF_NAME" \
              --repo "$GITHUB_REPOSITORY" \
              --notes-file release-notes.md
            gh release upload "$GITHUB_REF_NAME" $assets \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" $assets \
              --repo "$GITHUB_REPOSITORY" \
              --title "Bashes $GITHUB_REF_NAME" \
              --notes-file release-notes.md
          fi
