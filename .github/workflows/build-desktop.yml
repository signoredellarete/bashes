name: Build Desktop App

on:
  push:
    branches:
      - main
    tags:
      - v*
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    name: Headless tests
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Run Go tests
        run: go test ./...

      - name: Build frontend
        run: npm run build --prefix frontend

  linux-desktop:
    name: Linux desktop build
    runs-on: ubuntu-22.04
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Wails Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            pkg-config

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --prefix frontend

      - name: Install Wails CLI
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"

      - name: Build Wails app
        run: wails build -tags desktop -clean -nopackage -v 2

      - name: Package Linux binary
        run: |
          mkdir -p dist
          tar -C build/bin -czf dist/bashes-linux-amd64.tar.gz .

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: bashes-linux-amd64
          path: dist/bashes-linux-amd64.tar.gz
          if-no-files-found: error

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" dist/bashes-linux-amd64.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$GITHUB_REF_NAME" dist/bashes-linux-amd64.tar.gz \
              --repo "$GITHUB_REPOSITORY" \
              --title "Bashes $GITHUB_REF_NAME" \
              --notes "Wails desktop preview build for Linux amd64. This is an early refactor milestone: the JSON datastore and desktop shell are available, while SSH/xterm session streaming is still in progress."
          fi
